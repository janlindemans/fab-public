      margin: 0 0 4px;
      color: #c4b5fd;
    }
    .subtitle {

      color: #9ca3af;
      margin-bottom: 12px;
    }
    .river-wrap {
      position: relative;
      width: 320px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-height: 0;
      justify-content: center;
    }
    /* Zigzag wire (river path) – behind the strip so the bend is visible */
    .wire {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .wire path {
      fill: none;
      stroke: rgba(167, 139, 250, 0.55);
      stroke-width: 3;
      stroke-linecap: round;
    }
    .row {
      display: flex;
      flex-wrap: nowrap;
      gap: 2px;
      margin-bottom: 4px;
      justify-content: center;
    }
    .row--left { align-self: flex-start; }
    .row--right { flex-direction: row-reverse; align-self: flex-end; }
    .cell {
      flex-shrink: 0;
      width: 16px;
      height: 35px;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    footer {
      font-size: 0.7rem;
      color: #6b7280;
      margin-top: 8px;
    }
